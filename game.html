<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VEZITIVUS GAME APP</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --card: rgba(255, 255, 255, 0.88);
      --solid: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: rgba(17, 24, 39, 0.1);
      --blue: #007aff;
      --green: #18a058;
      --orange: #ff9500;
      --red: #ff3b30;
      --dark: #111827;
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.09);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0, 122, 255, 0.15), transparent 34%),
        radial-gradient(circle at bottom right, rgba(24, 160, 88, 0.13), transparent 34%),
        var(--bg);
      padding: 14px;
    }

    .app {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    .brand {
      text-align: left;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      letter-spacing: -0.06em;
      line-height: 0.95;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
      line-height: 1.4;
      max-width: 650px;
    }

    .status-pill {
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px;
      margin-bottom: 16px;
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 35px rgba(0,0,0,0.06);
    }

    .tab-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      min-height: 48px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .tab-btn.active {
      background: var(--dark);
      color: white;
      box-shadow: 0 10px 28px rgba(17,24,39,0.18);
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      padding: 16px;
      margin-bottom: 16px;
    }

    .hidden {
      display: none !important;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 22px;
      letter-spacing: -0.035em;
    }

    .grid-controls {
      display: grid;
      grid-template-columns: 1fr 160px auto auto;
      gap: 10px;
      align-items: end;
    }

    .solo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      margin: 0 0 7px 2px;
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    select,
    input[type="number"],
    input[type="text"],
    input[type="password"] {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #fff, #fafafa);
      color: var(--text);
      padding: 0 15px;
      font-size: 16px;
      font-weight: 800;
      outline: none;
    }

    input[type="number"] {
      text-align: center;
    }

    button {
      border: 0;
      min-height: 56px;
      border-radius: var(--radius-lg);
      padding: 0 16px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease, background 0.16s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
      box-shadow: 0 12px 28px rgba(0,122,255,0.22);
    }

    .btn-green {
      background: var(--green);
      color: white;
      box-shadow: 0 12px 28px rgba(24,160,88,0.22);
    }

    .btn-orange {
      background: var(--orange);
      color: white;
      box-shadow: 0 12px 28px rgba(255,149,0,0.22);
    }

    .btn-red {
      background: var(--red);
      color: white;
      box-shadow: 0 12px 28px rgba(255,59,48,0.20);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.78);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .teams-container {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .team-box {
      background: var(--solid);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 14px;
      min-height: 220px;
    }

    .team-header {
      display: grid;
      grid-template-columns: 1fr 100px;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .team-name {
      min-height: 48px;
      border-radius: var(--radius-md);
      font-size: 17px;
      text-align: left;
    }

    .points-input {
      min-height: 48px;
      border-radius: var(--radius-md);
      font-size: 18px;
    }

    .dropzone {
      min-height: 130px;
      border: 1.5px dashed rgba(0, 122, 255, 0.32);
      border-radius: var(--radius-lg);
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
      background: linear-gradient(180deg, rgba(0,122,255,0.035), rgba(255,255,255,0.8));
      transition: 0.18s ease;
    }

    .dropzone.hover {
      border-color: var(--blue);
      background: rgba(0,122,255,0.09);
      transform: scale(1.01);
    }

    .dropzone.empty::before {
      content: "Velc dalībniekus šeit";
      width: 100%;
      min-height: 105px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 90px;
    }

    .player-chip {
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      border: 1px solid rgba(17,24,39,0.09);
      background: linear-gradient(180deg, #fff, #f7f7f8);
      border-radius: 999px;
      padding: 8px 10px 8px 12px;
      cursor: grab;
      box-shadow: 0 7px 16px rgba(0,0,0,0.055);
      transition: 0.16s ease;
    }

    .player-chip.selected {
      border-color: rgba(0,122,255,0.7);
      background: rgba(0,122,255,0.09);
      box-shadow: 0 10px 24px rgba(0,122,255,0.14);
    }

    .player-chip.dragging {
      opacity: 0.52;
    }

    .player-main {
      display: grid;
      min-width: 0;
      text-align: left;
      line-height: 1.06;
    }

    .player-name {
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-id {
      margin-top: 3px;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
    }

    .remove-chip {
      width: 22px;
      height: 22px;
      min-height: 22px;
      padding: 0;
      border-radius: 50%;
      background: rgba(17,24,39,0.07);
      color: var(--muted);
      font-size: 15px;
      line-height: 1;
    }

    .actions-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .actions-row button {
      flex: 1;
      min-width: 180px;
    }

    .solo-card {
      background: var(--solid);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .solo-player {
      display: grid;
      gap: 8px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: rgba(17,24,39,0.94);
      color: white;
      padding: 13px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 18px 50px rgba(0,0,0,0.25);
      z-index: 1000;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(0,0,0,0.36);
      backdrop-filter: blur(18px);
    }

    .modal-card {
      width: min(100%, 380px);
      background: white;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 30px 100px rgba(0,0,0,0.30);
    }

    .modal-card h3 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .modal-card p {
      margin: 8px 0 14px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.4;
    }

    .pin-error {
      min-height: 20px;
      margin-top: 8px;
      color: var(--red);
      font-size: 13px;
      font-weight: 900;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    @media (max-width: 820px) {
      .topbar {
        display: block;
      }

      .status-pill {
        display: inline-flex;
        margin-top: 14px;
        white-space: normal;
      }

      .grid-controls {
        grid-template-columns: 1fr;
      }

      .teams-container {
        grid-template-columns: 1fr;
      }

      .solo-grid {
        grid-template-columns: 1fr;
      }

      .actions-row {
        display: grid;
      }

      .actions-row button {
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="eyebrow">VEZITIVUS</div>
        <h1>Game App</h1>
        <p class="subtitle">
          Viena lapa komandu spēlēm un solo spēlēm. Drag & drop darbojas datorā,
          telefonā var izvēlēties dalībnieku un pieskarties komandai.
        </p>
      </div>

      <div class="status-pill" id="statusPill">Ielādē datus…</div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" id="teamTab" type="button">Komandu spēles</button>
      <button class="tab-btn" id="soloTab" type="button">Solo spēles</button>
    </nav>

    <!-- KOMANDU SPĒLES -->
    <section id="teamPanel">
      <div class="panel">
        <h2 class="section-title">Komandu spēles</h2>

        <div class="grid-controls">
          <div class="field">
            <label for="teamActivity">Aktivitāte</label>
            <select id="teamActivity">
              <option value="" disabled selected>Izvēlies aktivitāti</option>
            </select>
          </div>

          <div class="field">
            <label for="teamCount">Komandu skaits</label>
            <input type="number" id="teamCount" min="2" max="12" value="2" />
          </div>

          <button class="btn-primary" id="createTeamsBtn" type="button">Izveidot</button>
          <button class="btn-orange" id="splitBtn" type="button">Sadalīt</button>
        </div>

        <div id="teamsContainer" class="teams-container"></div>

        <div class="actions-row">
          <button class="btn-green" id="saveTeamResultsBtn" type="button">Saglabāt rezultātus</button>
          <button class="btn-ghost" id="sendTeamNamesBtn" type="button">Saglabāt komandu nosaukumus</button>
          <button class="btn-red" id="resetTeamsBtn" type="button">Nodzēst komandas</button>
        </div>
      </div>

      <div class="panel">
        <h2 class="section-title">Dalībnieki</h2>
        <div id="playersPool" class="pool"></div>
      </div>
    </section>

    <!-- SOLO SPĒLES -->
    <section id="soloPanel" class="hidden">
      <div class="panel">
        <h2 class="section-title">Solo spēles</h2>

        <div class="solo-card">
          <div class="field" style="margin-bottom: 12px;">
            <label for="soloGame">Spēle</label>
            <select id="soloGame">
              <option value="" disabled selected>Izvēlies spēli</option>
            </select>
          </div>

          <div class="solo-grid">
            <div class="solo-player">
              <div class="field">
                <label for="soloPlayer1">Spēlētājs 1</label>
                <select id="soloPlayer1">
                  <option value="" disabled selected>Spēlētājs 1</option>
                </select>
              </div>

              <div class="field">
                <label for="soloScore1">Punkti</label>
                <input type="number" id="soloScore1" min="0" placeholder="0" disabled />
              </div>
            </div>

            <div class="solo-player">
              <div class="field">
                <label for="soloPlayer2">Spēlētājs 2</label>
                <select id="soloPlayer2">
                  <option value="" disabled selected>Spēlētājs 2</option>
                </select>
              </div>

              <div class="field">
                <label for="soloScore2">Punkti</label>
                <input type="number" id="soloScore2" min="0" placeholder="0" disabled />
              </div>
            </div>
          </div>

          <div class="actions-row">
            <button class="btn-green" id="saveSoloResultsBtn" type="button" disabled>
              Nosūtīt rezultātus
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <div class="modal hidden" id="pinModal">
    <div class="modal-card">
      <h3>PIN kods</h3>
      <p id="pinMessage">Ievadi PIN kodu, lai turpinātu.</p>

      <input
        id="pinInput"
        type="password"
        inputmode="numeric"
        maxlength="8"
        placeholder="••••"
      />

      <div class="pin-error" id="pinError"></div>

      <div class="modal-actions">
        <button class="btn-ghost" id="pinCancel" type="button">Atcelt</button>
        <button class="btn-primary" id="pinOk" type="button">Apstiprināt</button>
      </div>
    </div>
  </div>

  <script>
    /***********************
     * CONFIG
     ***********************/
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyImlTsT9MQ2EFIqLI1e1VPgo7ESp1FlgDNTuqDhXB8Af6WRnqlWkkTd4cE29ymDqVjvg/exec";
    const PIN_CODE = "6969";

    /***********************
     * STATE
     ***********************/
    const state = {
      games: [],
      players: [],
      selectedChipId: null,
      teams: [],
      pool: [],
      activeMode: "team",
      saving: false
    };

    const el = {};

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      cacheElements();
      bindEvents();
      loadData();
    }

    function cacheElements() {
      el.statusPill = document.getElementById("statusPill");
      el.toast = document.getElementById("toast");

      el.teamTab = document.getElementById("teamTab");
      el.soloTab = document.getElementById("soloTab");
      el.teamPanel = document.getElementById("teamPanel");
      el.soloPanel = document.getElementById("soloPanel");

      el.teamActivity = document.getElementById("teamActivity");
      el.teamCount = document.getElementById("teamCount");
      el.createTeamsBtn = document.getElementById("createTeamsBtn");
      el.splitBtn = document.getElementById("splitBtn");
      el.teamsContainer = document.getElementById("teamsContainer");
      el.playersPool = document.getElementById("playersPool");
      el.saveTeamResultsBtn = document.getElementById("saveTeamResultsBtn");
      el.sendTeamNamesBtn = document.getElementById("sendTeamNamesBtn");
      el.resetTeamsBtn = document.getElementById("resetTeamsBtn");

      el.soloGame = document.getElementById("soloGame");
      el.soloPlayer1 = document.getElementById("soloPlayer1");
      el.soloPlayer2 = document.getElementById("soloPlayer2");
      el.soloScore1 = document.getElementById("soloScore1");
      el.soloScore2 = document.getElementById("soloScore2");
      el.saveSoloResultsBtn = document.getElementById("saveSoloResultsBtn");

      el.pinModal = document.getElementById("pinModal");
      el.pinMessage = document.getElementById("pinMessage");
      el.pinInput = document.getElementById("pinInput");
      el.pinError = document.getElementById("pinError");
      el.pinCancel = document.getElementById("pinCancel");
      el.pinOk = document.getElementById("pinOk");
    }

    function bindEvents() {
      el.teamTab.addEventListener("click", () => switchMode("team"));
      el.soloTab.addEventListener("click", () => switchMode("solo"));

      el.createTeamsBtn.addEventListener("click", createTeams);
      el.splitBtn.addEventListener("click", splitPlayers);
      el.saveTeamResultsBtn.addEventListener("click", saveTeamResults);
      el.sendTeamNamesBtn.addEventListener("click", saveTeamNames);
      el.resetTeamsBtn.addEventListener("click", resetTeamsWithPin);

      el.soloGame.addEventListener("change", populateSoloPlayers);
      el.soloPlayer1.addEventListener("change", checkSoloReady);
      el.soloPlayer2.addEventListener("change", checkSoloReady);
      el.soloScore1.addEventListener("input", checkSoloReady);
      el.soloScore2.addEventListener("input", checkSoloReady);
      el.saveSoloResultsBtn.addEventListener("click", saveSoloResults);

      el.pinCancel.addEventListener("click", () => closePin(false));
      el.pinOk.addEventListener("click", checkPin);
      el.pinInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") checkPin();
        if (event.key === "Escape") closePin(false);
      });
    }

    /***********************
     * MODE
     ***********************/
    function switchMode(mode) {
      state.activeMode = mode;

      el.teamTab.classList.toggle("active", mode === "team");
      el.soloTab.classList.toggle("active", mode === "solo");

      el.teamPanel.classList.toggle("hidden", mode !== "team");
      el.soloPanel.classList.toggle("hidden", mode !== "solo");

      setStatus(mode === "team" ? "Komandu spēļu režīms." : "Solo spēļu režīms.");
    }

    /***********************
     * DATA LOAD
     ***********************/
    function loadData() {
      setStatus("Ielādē datus no Google Sheets…");

      jsonp({
        callback: "appDataCallback",
        v: Date.now()
      });
    }

    window.appDataCallback = function(data) {
      const normalized = normalizeData(data);

      state.games = normalized.games;
      state.players = normalized.players;

      populateGameSelects();
      resetPool();

      setStatus(`Ielādēts: ${state.games.length} spēles, ${state.players.length} dalībnieki.`);
    };

    function normalizeData(data) {
      let games = [];
      let players = [];

      if (Array.isArray(data)) {
        games = data.map(item => ({
          name: String(item.name || item.game || item.activity || item || "").trim(),
          players: Array.isArray(item.players) ? item.players.map(String) : []
        })).filter(g => g.name);

        const playerNames = new Set();

        games.forEach(game => {
          game.players.forEach(player => {
            if (String(player).trim()) playerNames.add(String(player).trim());
          });
        });

        players = [...playerNames].map((name, index) => ({
          id: name,
          name
        }));
      }

      if (data && typeof data === "object" && !Array.isArray(data)) {
        const rawGames = data.games || data.activities || data.speles || data.aktivitates || [];
        const rawPlayers = data.players || data.participants || data.dalibnieki || [];

        games = rawGames.map(item => {
          if (typeof item === "string") {
            return { name: item.trim(), players: [] };
          }

          return {
            name: String(item.name || item.game || item.activity || item.title || "").trim(),
            players: Array.isArray(item.players) ? item.players.map(String) : []
          };
        }).filter(g => g.name);

        players = rawPlayers.map((player, index) => normalizePlayer(player, index));
      }

      if (!players.length && games.some(game => game.players.length)) {
        const playerNames = new Set();

        games.forEach(game => {
          game.players.forEach(player => {
            if (String(player).trim()) playerNames.add(String(player).trim());
          });
        });

        players = [...playerNames].map(name => ({
          id: name,
          name
        }));
      }

      games.sort((a, b) => a.name.localeCompare(b.name, "lv"));
      players.sort((a, b) => a.name.localeCompare(b.name, "lv"));

      return { games, players };
    }

    function normalizePlayer(player, index) {
      if (typeof player === "string") {
        const name = player.trim();

        return {
          id: name || `P${index + 1}`,
          name: name || `Dalībnieks ${index + 1}`
        };
      }

      const id = String(
        player.id ||
        player.ID ||
        player.nr ||
        player.Nr ||
        player.code ||
        player.Kods ||
        player["Dalībnieka ID"] ||
        ""
      ).trim();

      const name = String(
        player.name ||
        player.Name ||
        player.vards ||
        player.vārds ||
        player.Vārds ||
        player.Iesauka ||
        player.nickname ||
        player.Nickname ||
        ""
      ).trim();

      return {
        id: id || name || `P${index + 1}`,
        name: name || id || `Dalībnieks ${index + 1}`
      };
    }

    function populateGameSelects() {
      clearSelect(el.teamActivity, "Izvēlies aktivitāti");
      clearSelect(el.soloGame, "Izvēlies spēli");

      state.games.forEach(game => {
        el.teamActivity.add(new Option(game.name, game.name));
        el.soloGame.add(new Option(game.name, game.name));
      });
    }

    function clearSelect(select, placeholder) {
      select.innerHTML = "";
      const option = new Option(placeholder, "");
      option.disabled = true;
      option.selected = true;
      select.add(option);
    }

    /***********************
     * TEAM MODE
     ***********************/
    function resetPool() {
      state.pool = getPlayersForSelectedTeamActivity().map(player => player.id);
      renderPool();
    }

    function getPlayersForSelectedTeamActivity() {
      const game = state.games.find(g => g.name === el.teamActivity.value);

      if (game && game.players && game.players.length) {
        return game.players.map(name => ({
          id: String(name),
          name: String(name)
        }));
      }

      return state.players;
    }

    function createTeams() {
      const count = Number(el.teamCount.value);

      if (!el.teamActivity.value) {
        showToast("Izvēlies aktivitāti.");
        return;
      }

      if (!count || count < 2) {
        showToast("Komandu skaitam jābūt vismaz 2.");
        return;
      }

      const players = getPlayersForSelectedTeamActivity();

      state.teams = Array.from({ length: count }, (_, index) => ({
        id: `team-${index + 1}`,
        name: `Komanda ${index + 1}`,
        points: "",
        players: []
      }));

      state.pool = players.map(player => player.id);
      state.selectedChipId = null;

      renderTeams();
      renderPool();

      setStatus(`Izveidotas ${count} komandas.`);
    }

    function splitPlayers() {
      if (!state.teams.length) {
        showToast("Vispirms izveido komandas.");
        return;
      }

      const allPlayerIds = [
        ...state.pool,
        ...state.teams.flatMap(team => team.players)
      ];

      const shuffled = [...new Set(allPlayerIds)].sort(() => Math.random() - 0.5);

      state.teams.forEach(team => {
        team.players = [];
      });

      state.pool = [];

      shuffled.forEach((playerId, index) => {
        const teamIndex = index % state.teams.length;
        state.teams[teamIndex].players.push(playerId);
      });

      renderTeams();
      renderPool();

      setStatus("Dalībnieki sadalīti komandās.");
    }

    function renderTeams() {
      el.teamsContainer.innerHTML = "";

      state.teams.forEach(team => {
        const box = document.createElement("article");
        box.className = "team-box";

        const header = document.createElement("div");
        header.className = "team-header";

        const nameInput = document.createElement("input");
        nameInput.className = "team-name";
        nameInput.type = "text";
        nameInput.value = team.name;
        nameInput.addEventListener("input", () => {
          team.name = nameInput.value.trim() || team.id;
        });

        const pointsInput = document.createElement("input");
        pointsInput.className = "points-input";
        pointsInput.type = "number";
        pointsInput.placeholder = "Punkti";
        pointsInput.value = team.points;
        pointsInput.addEventListener("input", () => {
          team.points = pointsInput.value;
        });

        header.appendChild(nameInput);
        header.appendChild(pointsInput);

        const zone = document.createElement("div");
        zone.className = "dropzone";
        zone.dataset.teamId = team.id;

        if (!team.players.length) {
          zone.classList.add("empty");
        }

        setupDropzone(zone, team.id);

        team.players.forEach(playerId => {
          zone.appendChild(createChip(playerId, team.id));
        });

        box.appendChild(header);
        box.appendChild(zone);
        el.teamsContainer.appendChild(box);
      });
    }

    function renderPool() {
      el.playersPool.innerHTML = "";

      state.pool.forEach(playerId => {
        el.playersPool.appendChild(createChip(playerId, "pool"));
      });
    }

    function createChip(playerId, location) {
      const player = getPlayer(playerId);

      const chip = document.createElement("div");
      chip.className = "player-chip";
      chip.draggable = true;
      chip.dataset.id = playerId;
      chip.dataset.location = location;

      if (state.selectedChipId === playerId) {
        chip.classList.add("selected");
      }

      const main = document.createElement("span");
      main.className = "player-main";

      const name = document.createElement("span");
      name.className = "player-name";
      name.textContent = player.name;

      const id = document.createElement("span");
      id.className = "player-id";
      id.textContent = player.id;

      main.appendChild(name);
      main.appendChild(id);
      chip.appendChild(main);

      if (location !== "pool") {
        const remove = document.createElement("button");
        remove.className = "remove-chip";
        remove.type = "button";
        remove.textContent = "×";
        remove.addEventListener("click", event => {
          event.stopPropagation();
          movePlayer(playerId, "pool");
        });

        chip.appendChild(remove);
      }

      chip.addEventListener("click", event => {
        event.stopPropagation();
        state.selectedChipId = state.selectedChipId === playerId ? null : playerId;
        renderTeams();
        renderPool();
      });

      chip.addEventListener("dragstart", event => {
        event.dataTransfer.setData("text/plain", playerId);
        chip.classList.add("dragging");
      });

      chip.addEventListener("dragend", () => {
        chip.classList.remove("dragging");
      });

      return chip;
    }

    function setupDropzone(zone, teamId) {
      zone.addEventListener("click", () => {
        if (state.selectedChipId) {
          movePlayer(state.selectedChipId, teamId);
        }
      });

      zone.addEventListener("dragover", event => {
        event.preventDefault();
        zone.classList.add("hover");
      });

      zone.addEventListener("dragleave", () => {
        zone.classList.remove("hover");
      });

      zone.addEventListener("drop", event => {
        event.preventDefault();
        zone.classList.remove("hover");

        const playerId = event.dataTransfer.getData("text/plain");
        if (playerId) {
          movePlayer(playerId, teamId);
        }
      });
    }

    function movePlayer(playerId, target) {
      removePlayerEverywhere(playerId);

      if (target === "pool") {
        state.pool.push(playerId);
      } else {
        const team = state.teams.find(t => t.id === target);
        if (team) team.players.push(playerId);
      }

      state.selectedChipId = null;

      renderTeams();
      renderPool();
    }

    function removePlayerEverywhere(playerId) {
      state.pool = state.pool.filter(id => id !== playerId);
      state.teams.forEach(team => {
        team.players = team.players.filter(id => id !== playerId);
      });
    }

    function getPlayer(playerId) {
      const selectedGamePlayers = getPlayersForSelectedTeamActivity();
      const player =
        state.players.find(p => p.id === playerId) ||
        selectedGamePlayers.find(p => p.id === playerId) ||
        { id: playerId, name: playerId };

      return player;
    }

    async function saveTeamResults() {
      if (!state.teams.length) {
        showToast("Nav izveidotas komandas.");
        return;
      }

      if (!el.teamActivity.value) {
        showToast("Izvēlies aktivitāti.");
        return;
      }

      const emptyTeams = state.teams.filter(team => !team.players.length);
      if (emptyTeams.length) {
        showToast("Katrai komandai jābūt vismaz vienam dalībniekam.");
        return;
      }

      const invalidPoints = state.teams.some(team => team.points === "" || Number.isNaN(Number(team.points)));
      if (invalidPoints) {
        showToast("Visām komandām jāievada punkti.");
        return;
      }

      const points = state.teams.map(team => Number(team.points));
      const uniquePoints = new Set(points);

      if (uniquePoints.size !== points.length) {
        showToast("Neizšķirts nav atļauts. Punktiem jāatšķiras.");
        return;
      }

      const pinOk = await requestPin("Lai saglabātu rezultātus, ievadi PIN kodu.");
      if (!pinOk) return;

      const sortedTeams = [...state.teams].sort((a, b) => Number(b.points) - Number(a.points));

      const payload = {
        mode: "team",
        game: el.teamActivity.value,
        createdAt: new Date().toISOString(),
        teams: sortedTeams.map((team, index) => ({
          place: index + 1,
          teamName: team.name,
          points: Number(team.points),
          playerIds: team.players,
          playerNames: team.players.map(id => getPlayer(id).name)
        }))
      };

      setSaving(true);

      jsonp({
        callback: "saveCallback",
        action: "saveResults",
        mode: "team",
        game: payload.game,
        resultsData: JSON.stringify(payload),
        v: Date.now()
      });
    }

    async function saveTeamNames() {
      if (!state.teams.length) {
        showToast("Nav izveidotas komandas.");
        return;
      }

      const pinOk = await requestPin("Lai saglabātu komandu nosaukumus, ievadi PIN kodu.");
      if (!pinOk) return;

      const payload = {
        mode: "teamNames",
        game: el.teamActivity.value,
        createdAt: new Date().toISOString(),
        teams: state.teams.map(team => ({
          teamName: team.name,
          playerIds: team.players,
          playerNames: team.players.map(id => getPlayer(id).name)
        }))
      };

      setSaving(true);

      jsonp({
        callback: "saveCallback",
        action: "saveTeamNames",
        mode: "teamNames",
        game: payload.game,
        resultsData: JSON.stringify(payload),
        v: Date.now()
      });
    }

    async function resetTeamsWithPin() {
      const pinOk = await requestPin("Lai nodzēstu komandas, ievadi PIN kodu.");
      if (!pinOk) return;

      state.teams = [];
      resetPool();
      renderTeams();

      showToast("Komandas nodzēstas.");
      setStatus("Komandas nodzēstas.");
    }

    /***********************
     * SOLO MODE
     ***********************/
    function populateSoloPlayers() {
      const game = state.games.find(g => g.name === el.soloGame.value);
      const playerNames = game && game.players && game.players.length
        ? game.players.map(String)
        : state.players.map(p => p.name);

      clearSelect(el.soloPlayer1, "Spēlētājs 1");
      clearSelect(el.soloPlayer2, "Spēlētājs 2");

      playerNames.forEach(name => {
        el.soloPlayer1.add(new Option(name, name));
        el.soloPlayer2.add(new Option(name, name));
      });

      el.soloScore1.value = "";
      el.soloScore2.value = "";
      el.soloScore1.disabled = true;
      el.soloScore2.disabled = true;
      el.saveSoloResultsBtn.disabled = true;

      setStatus(`Izvēlēta solo spēle: ${el.soloGame.value}`);
    }

    function checkSoloReady() {
      const playersSelected =
        el.soloPlayer1.value &&
        el.soloPlayer2.value &&
        el.soloPlayer1.value !== el.soloPlayer2.value;

      el.soloScore1.disabled = !playersSelected;
      el.soloScore2.disabled = !playersSelected;

      if (!playersSelected) {
        el.saveSoloResultsBtn.disabled = true;
        return;
      }

      const scoresFilled = el.soloScore1.value !== "" && el.soloScore2.value !== "";
      const noTie = Number(el.soloScore1.value) !== Number(el.soloScore2.value);

      el.saveSoloResultsBtn.disabled = !(scoresFilled && noTie);

      if (scoresFilled && !noTie) {
        showToast("Neizšķirts nav atļauts.");
      }
    }

    async function saveSoloResults() {
      if (!el.soloGame.value) {
        showToast("Izvēlies spēli.");
        return;
      }

      if (!el.soloPlayer1.value || !el.soloPlayer2.value) {
        showToast("Izvēlies abus spēlētājus.");
        return;
      }

      if (el.soloPlayer1.value === el.soloPlayer2.value) {
        showToast("Spēlētāji nedrīkst būt vienādi.");
        return;
      }

      const s1 = Number(el.soloScore1.value);
      const s2 = Number(el.soloScore2.value);

      if (Number.isNaN(s1) || Number.isNaN(s2)) {
        showToast("Ievadi punktus.");
        return;
      }

      if (s1 === s2) {
        showToast("Neizšķirts nav atļauts.");
        return;
      }

      const pinOk = await requestPin("Lai saglabātu solo rezultātu, ievadi PIN kodu.");
      if (!pinOk) return;

      const winner = s1 > s2 ? el.soloPlayer1.value : el.soloPlayer2.value;
      const loser = s1 > s2 ? el.soloPlayer2.value : el.soloPlayer1.value;

      setSaving(true);

      jsonp({
        callback: "saveCallback",
        action: "saveSoloResults",
        mode: "solo",
        game: el.soloGame.value,
        winner,
        loser,
        winnerPoints: Math.max(s1, s2),
        loserPoints: Math.min(s1, s2),
        v: Date.now()
      });
    }

    /***********************
     * SAVE CALLBACK
     ***********************/
    window.saveCallback = function(response) {
      setSaving(false);

      const ok =
        !response ||
        response.status === "success" ||
        response.success === true ||
        response.result === "success";

      if (ok) {
        showToast("Saglabāts.");
        setStatus("Rezultāts saglabāts.");

        if (state.activeMode === "solo") {
          el.soloScore1.value = "";
          el.soloScore2.value = "";
          el.saveSoloResultsBtn.disabled = true;
        }

        return;
      }

      showToast(response.message || "Saglabāšanas kļūda.");
      setStatus("Saglabāšanas kļūda.");
    };

    function setSaving(isSaving) {
      state.saving = isSaving;

      el.saveTeamResultsBtn.disabled = isSaving;
      el.saveSoloResultsBtn.disabled = isSaving;

      el.saveTeamResultsBtn.textContent = isSaving ? "Saglabā…" : "Saglabāt rezultātus";
      el.saveSoloResultsBtn.textContent = isSaving ? "Saglabā…" : "Nosūtīt rezultātus";
    }

    /***********************
     * JSONP
     ***********************/
    function jsonp(params) {
      const script = document.createElement("script");
      const url = new URL(WEBAPP_URL);

      Object.entries(params).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });

      script.src = url.toString();

      script.onerror = () => {
        setSaving(false);
        showToast("Neizdevās sazināties ar Google Script.");
        setStatus("Savienojuma kļūda.");
        script.remove();
      };

      document.body.appendChild(script);

      setTimeout(() => {
        script.remove();
      }, 15000);
    }

    /***********************
     * PIN
     ***********************/
    let pinResolver = null;

    function requestPin(message) {
      return new Promise(resolve => {
        pinResolver = resolve;
        el.pinMessage.textContent = message;
        el.pinError.textContent = "";
        el.pinInput.value = "";
        el.pinModal.classList.remove("hidden");

        setTimeout(() => {
          el.pinInput.focus();
        }, 40);
      });
    }

    function checkPin() {
      const value = el.pinInput.value.trim();

      if (value === PIN_CODE) {
        closePin(true);
        return;
      }

      el.pinError.textContent = "Nepareizs PIN kods.";
      el.pinInput.select();
    }

    function closePin(result) {
      el.pinModal.classList.add("hidden");

      if (pinResolver) {
        pinResolver(result);
        pinResolver = null;
      }
    }

    /***********************
     * UI HELPERS
     ***********************/
    function setStatus(message) {
      el.statusPill.textContent = message;
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");

      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        el.toast.classList.remove("show");
      }, 2400);
    }
  </script>
</body>
</html>
