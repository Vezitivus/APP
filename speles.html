<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f9">
  <meta name="color-scheme" content="light">
  <title>Vezitivus — rezultātu ievade</title>
  <link rel="stylesheet" href="./speles.css?v=4">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Vezitivus</p>
        <h1>Rezultātu ievade</h1>
      </div>
      <div class="connection" id="connection" data-state="busy" aria-live="polite">
        <span class="connection-dot" aria-hidden="true"></span>
        <span id="connectionText">Ielādē datus</span>
      </div>
    </header>

    <div class="panel">
      <section class="section">
        <div class="section-title">
          <h2><span class="step-number">1</span>Spēles iestatījumi</h2>
          <button class="refresh-btn" id="refreshBtn" type="button">Atjaunot datus</button>
        </div>

        <div class="setup-grid">
          <div>
            <label class="field-label" for="gameSelect">Spēle</label>
            <div class="select-wrap">
              <select class="select-control" id="gameSelect" disabled>
                <option value="">Ielādē spēles…</option>
              </select>
              <span class="select-chevron" aria-hidden="true"></span>
            </div>
          </div>

          <div>
            <label class="field-label" for="teamCountSelect">Komandu skaits</label>
            <div class="select-wrap">
              <select class="select-control" id="teamCountSelect"></select>
              <span class="select-chevron" aria-hidden="true"></span>
            </div>
          </div>
        </div>

        <label class="field-label">Disciplīnas veids</label>
        <div class="mode-switch" role="group" aria-label="Disciplīnas veids">
          <button class="mode-btn active" id="playersModeBtn" type="button" data-mode="players">SPĒLĒTĀJU KOMANDAS</button>
          <button class="mode-btn" id="officialModeBtn" type="button" data-mode="officialTeams">KOMANDU DISCIPLĪNA</button>
        </div>
        <div class="mode-help" id="modeHelp">Katras komandas spēlētājus izvēlies no gamehost spēlētāju saraksta.</div>
      </section>

      <section class="section">
        <div class="section-title">
          <h2><span class="step-number">2</span>Komandas un punkti</h2>
        </div>
        <div class="teams-grid" id="teamsGrid"></div>
      </section>
    </div>
  </main>

  <div class="save-dock">
    <div class="save-inner">
      <button class="save-btn" id="saveBtn" type="button" disabled>Saglabāt rezultātus</button>
    </div>
  </div>

  <div class="modal" id="pickerModal" aria-hidden="true">
    <section class="picker" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
      <div class="picker-head">
        <div>
          <h2 class="picker-title" id="pickerTitle">Izvēlies spēlētājus</h2>
          <div class="picker-sub" id="pickerSub">Komanda 1</div>
        </div>
        <button class="close-btn" id="closePickerBtn" type="button" aria-label="Aizvērt">×</button>
      </div>
      <div class="picker-tools">
        <input class="search-input" id="pickerSearch" type="search" autocomplete="off" placeholder="Meklēt pēc vārda vai ID…">
      </div>
      <div class="picker-scroll" id="pickerScroll">
        <div class="picker-grid" id="pickerGrid"></div>
      </div>
      <div class="picker-foot">
        <div class="selection-summary" id="selectionSummary"><strong>0</strong> izvēlēti</div>
        <button class="done-btn" id="donePickerBtn" type="button">Gatavs</button>
      </div>
    </section>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <div class="loading-cover" id="loadingCover" aria-hidden="true">
    <div class="loader-card">
      <span class="spinner" aria-hidden="true"></span>
      <span id="loadingText">Saglabā rezultātus…</span>
    </div>
  </div>

  <script src="./speles.js?v=4"></script>
</body>
</html>
