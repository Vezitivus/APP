    #spinButton{position:relative;min-height:72px;overflow:hidden;border:1px solid rgba(255,241,180,.72);border-radius:17px;background:linear-gradient(rgba(255,255,255,.26),transparent 24%),linear-gradient(#f04458,#b70829 45%,#720719);color:#fffbe9;cursor:pointer;box-shadow:inset 0 2px rgba(255,255,255,.25),inset 0 -5px rgba(68,0,15,.54),0 7px 0 #4a0614,0 15px 30px rgba(0,0,0,.42),0 0 24px rgba(227,34,68,.2);transition:.16s}#spinButton:before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 18%,rgba(255,255,255,.32) 42%,transparent 62%);transform:translateX(-130%);animation:shine 3.2s ease-in-out infinite}#spinButton:active:not(:disabled){transform:translateY(5px);box-shadow:inset 0 2px rgba(255,255,255,.22),0 2px 0 #4a0614,0 8px 18px rgba(0,0,0,.42)}#spinButton:disabled{cursor:not-allowed;filter:grayscale(.35) brightness(.72);transform:translateY(4px);box-shadow:0 3px 0 #3b1018,0 8px 18px rgba(0,0,0,.35)}

    .message{position:relative;min-height:44px;display:grid;place-items:center;margin:14px 0 0;color:var(--gold2);font-size:clamp(1.15rem,4vw,1.65rem);font-weight:900;text-shadow:0 0 14px rgba(255,216,88,.56)}.message:empty:after{content:"Veiksmi!";color:rgba(231,218,194,.52);font-size:.78rem;font-weight:750;letter-spacing:.18em;text-transform:uppercase;text-shadow:none}.note{margin:2px 0 0;color:rgba(196,180,161,.58);font-size:.68rem}
    .debtPopup{position:fixed!important;inset:0!important;z-index:7000!important;display:grid!important;place-items:center!important;width:auto!important;height:auto!important;padding:24px!important;transform:none!important;background:rgba(3,0,1,.9)!important;backdrop-filter:blur(18px);border:0!important;border-radius:0!important;color:#ffe6ea!important;font-size:1.05rem!important;line-height:1.55!important;box-shadow:none!important}.debtPopup:before{content:"SPĒLE APTURĒTA\A";white-space:pre;display:block;color:#fff0f3;font-family:Georgia,serif;font-size:1.8rem;font-weight:900}
    #bigWinOverlay{background:radial-gradient(circle,rgba(255,214,75,.22),transparent 52%)!important}.big-win-text{color:transparent!important;font-family:Georgia,serif!important;font-size:clamp(3.3rem,15vw,7.5rem)!important;font-weight:900!important;line-height:.92!important;background:linear-gradient(#fffef1,#ffe170 34%,#c27812 66%,#fff1a2)!important;-webkit-background-clip:text!important;background-clip:text!important;-webkit-text-stroke:1px rgba(255,249,218,.35);text-shadow:0 0 42px rgba(255,203,52,.45)!important;animation:bigWin 3s cubic-bezier(.18,.84,.21,1) forwards!important}
    #miniGameOverlay{backdrop-filter:blur(18px)}.miniCell{background:linear-gradient(145deg,#431527,#14070c)!important;border-color:rgba(255,220,104,.45)!important;border-radius:15px!important;box-shadow:inset 0 1px rgba(255,255,255,.07),0 8px 20px rgba(0,0,0,.30)!important}
    .animateResult,.animateSpin{animation:bounce .5s ease}.confetti,.coin{position:absolute;left:var(--l);top:-12vh;width:var(--w);height:var(--h);opacity:0;background:var(--c);border-radius:var(--r,2px);box-shadow:0 0 8px var(--c);animation:fall var(--t) cubic-bezier(.2,.7,.25,1) var(--delay) forwards}.coin{border:2px solid #fff1a0;background:radial-gradient(circle at 35% 30%,#fff8c7,#ffc52f 48%,#a85c00);animation-name:coinFall}
    @property --a{syntax:'<angle>';initial-value:0deg;inherits:false}@keyframes border{to{--a:360deg}}@keyframes roomSweep{to{transform:rotate(360deg)}}@keyframes orb{to{transform:translate3d(7vw,5vh,0) scale(1.12)}}@keyframes rise{0%{transform:translate(0,0) scale(.5);opacity:0}12%{opacity:.7}75%{opacity:.32}100%{transform:translate(var(--dr),-112vh) scale(1.35);opacity:0}}@keyframes bulbs{to{background-position:24px 50%}}@keyframes shine{0%,56%{transform:translateX(-130%)}78%,100%{transform:translateX(130%)}}@keyframes spinPulse{from{filter:drop-shadow(0 0 5px rgba(255,205,58,.12))}to{filter:drop-shadow(0 0 22px rgba(255,205,58,.42))}}@keyframes win{50%{transform:scale(1.012);filter:brightness(1.35) saturate(1.22)}}@keyframes loss{33%{transform:translateX(-5px)}66%{transform:translateX(5px)}}@keyframes bounce{45%{transform:scale(1.12)}}@keyframes bigWin{0%{transform:scale(.5) translateY(80px);opacity:0}18%{transform:scale(1.12);opacity:1}30%,78%{transform:scale(1);opacity:1}100%{transform:scale(1.1) translateY(-55px);opacity:0}}@keyframes fall{0%{transform:translateY(-8vh) rotate(0);opacity:0}8%{opacity:1}100%{transform:translate(var(--sw),118vh) rotate(var(--rot));opacity:.9}}@keyframes coinFall{0%{transform:translateY(-8vh) rotateY(0);opacity:0}10%{opacity:1}100%{transform:translate(var(--sw),118vh) rotateY(1080deg) rotateZ(420deg);opacity:.95}}
    @media(max-width:560px){#container{padding:8px;border-radius:25px}.machine{padding:14px 8px 18px;border-radius:18px}.stage{margin-top:18px;padding:8px;border-radius:16px}.reels{padding:5px;border-radius:12px}.reel{border-radius:7px}.controls{grid-template-columns:1fr;gap:10px}.bet{display:grid;grid-template-columns:auto 1fr;align-items:center;gap:12px}.payline{left:14px;right:14px}}
    @media(max-width:370px){.machine{padding-left:5px;padding-right:5px}.stage{padding:5px}.reels{gap:3px;padding:4px}.symbol{font-size:1.42rem}#remainingSpins{min-width:106px;padding:9px 10px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
  </style>

<body>
  <div class="orb a"></div><div class="orb b"></div>
  <div id="particleField" aria-hidden="true"></div><div id="fxLayer" aria-hidden="true"></div>
  <main class="scene">

        <div class="topbar"><div id="remainingSpins" aria-live="polite">🪙 Ielādē...</div><button id="soundButton" type="button" aria-label="Izslēgt skaņu">🔊</button></div>
        <p class="kicker">Vezitivus Casino</p>

          <div class="reels" id="reels">

          <div class="bet" id="multiplierContainer"><label for="multiplierSelect">Likmes reizinātājs</label><select id="multiplierSelect"><option value="1">× 1</option><option value="2">× 2</option><option value="3">× 3</option><option value="4">× 4</option><option value="5">× 5</option><option value="6">× 6</option><option value="7">× 7</option><option value="8">× 8</option><option value="9">× 9</option><option value="10">× 10</option><option value="25">× 25</option><option value="50">× 50</option><option value="100">× 100</option><option value="1000">× 1000</option></select></div>
          <button id="spinButton" type="button"><span class="spinLabel">Griezt</span><span class="spinCost">Likme tiek atskaitīta no bilances</span></button>

  </main>
  <script>
    window.__casinoAudio=[];window.__NativeAudio=window.Audio;window.Audio=function(...a){const x=new window.__NativeAudio(...a);window.__casinoAudio.push(x);return x};window.Audio.prototype=window.__NativeAudio.prototype;
  </script>
  <script src="book.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded",()=>{
      const particles=document.getElementById("particleField"),fx=document.getElementById("fxLayer"),sound=document.getElementById("soundButton"),spin=document.getElementById("spinButton"),box=document.getElementById("container");let enabled=localStorage.getItem("vezitivusCasinoSound")!=="off",ctx;
      const sync=()=>{sound.textContent=enabled?"🔊":"🔇";sound.classList.toggle("muted",!enabled);sound.setAttribute("aria-label",enabled?"Izslēgt skaņu":"Ieslēgt skaņu");(window.__casinoAudio||[]).forEach(a=>a.muted=!enabled)};sync();
      const ac=()=>{if(!enabled)return null;if(!ctx){const A=window.AudioContext||window.webkitAudioContext;if(A)ctx=new A}if(ctx?.state==="suspended")ctx.resume().catch(()=>{});return ctx};
      const tone=(f,d=.07,t="triangle",v=.03,delay=0)=>{const c=ac();if(!c)return;const s=c.currentTime+delay,o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.setValueAtTime(f,s);g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(v,s+.008);g.gain.exponentialRampToValueAtTime(.0001,s+d);o.connect(g);g.connect(c.destination);o.start(s);o.stop(s+d+.02)};
      sound.addEventListener("click",()=>{enabled=!enabled;localStorage.setItem("vezitivusCasinoSound",enabled?"on":"off");sync();if(enabled){tone(330);tone(660,.08,"sine",.02,.04)}});
      const cols=["#ffd95d","#ff3b60","#fff3b0","#b81232"];for(let i=0;i<(innerWidth<560?18:30);i++){const p=document.createElement("span");p.className="ambient-particle";p.style.setProperty("--s",`${Math.random()*3.5+1}px`);p.style.setProperty("--c",cols[Math.floor(Math.random()*cols.length)]);p.style.setProperty("--d",`${Math.random()*10+10}s`);p.style.setProperty("--delay",`${Math.random()*-18}s`);p.style.setProperty("--dr",`${Math.random()*150-75}px`);p.style.left=`${Math.random()*100}%`;particles.appendChild(p)}
      const celebrate=(big=false)=>{fx.innerHTML="";const colors=["#ffd95d","#fff4b2","#e92c4b","#fff","#8e1730"];for(let i=0;i<(big?90:52);i++){const p=document.createElement("span");p.className="confetti";p.style.setProperty("--l",`${Math.random()*100}%`);p.style.setProperty("--w",`${Math.random()*7+4}px`);p.style.setProperty("--h",`${Math.random()*15+8}px`);p.style.setProperty("--c",colors[Math.floor(Math.random()*colors.length)]);p.style.setProperty("--t",`${Math.random()*1.5+2.5}s`);p.style.setProperty("--delay",`${Math.random()*.7}s`);p.style.setProperty("--sw",`${Math.random()*280-140}px`);p.style.setProperty("--rot",`${Math.random()*1500-750}deg`);fx.appendChild(p)}for(let i=0;i<(big?28:12);i++){const p=document.createElement("span"),s=Math.random()*10+14;p.className="coin";p.style.setProperty("--l",`${Math.random()*100}%`);p.style.setProperty("--w",`${s}px`);p.style.setProperty("--h",`${s}px`);p.style.setProperty("--r","50%");p.style.setProperty("--c","#ffd95d");p.style.setProperty("--t",`${Math.random()*1.4+2.8}s`);p.style.setProperty("--delay",`${Math.random()*.9}s`);p.style.setProperty("--sw",`${Math.random()*240-120}px`);fx.appendChild(p)}setTimeout(()=>fx.innerHTML="",5000)};
      spin.addEventListener("click",()=>{ac();tone(245,.07,"triangle",.04);tone(490,.08,"sine",.025,.035)});document.getElementById("multiplierSelect").addEventListener("change",()=>tone(560,.06,"triangle",.027));document.querySelectorAll(".reel-inner").forEach((r,i)=>r.addEventListener("transitionend",e=>{if(e.propertyName==="transform"){tone(470-i*32,.075,"square",.025);tone(180-i*7,.095,"triangle",.018,.015)}}));
      let prev="";new MutationObserver(()=>{const now=box.classList.contains("win")?"win":box.classList.contains("loss")?"loss":"";if(now==="win"&&prev!=="win"){celebrate();tone(880,.08,"sine",.04);tone(1175,.1,"sine",.032,.07);tone(1568,.14,"triangle",.026,.14)}prev=now}).observe(box,{attributes:true,attributeFilter:["class"]});
      new MutationObserver(rs=>rs.forEach(r=>{r.addedNodes.forEach(n=>{if(n instanceof HTMLElement&&n.id==="bigWinOverlay")celebrate(true)});r.removedNodes.forEach(n=>{if(n instanceof HTMLElement&&n.id==="miniGameOverlay")setTimeout(()=>{if(!document.querySelector(".debtPopup"))spin.disabled=false},150)})})).observe(document.body,{childList:true});
    });
  </script>
</body>
</html>
