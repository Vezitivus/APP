<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08090c">
<title>VEZITIVUS QUEST ADMIN</title>
<style>
:root{color-scheme:dark;--bg:#08090c;--card:#15171d;--card2:#1b1e26;--line:#2a2e38;--text:#f7f7f8;--muted:#9ca0aa;--ok:#54d887;--warn:#ffbe55;--bad:#ff667a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#222743 0,transparent 35rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,textarea,select{font:inherit}.wrap{width:min(1320px,100%);margin:auto;padding:24px 18px 60px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}.brand b{letter-spacing:.14em}.brand small{display:block;color:var(--muted);margin-top:4px}.pill{padding:8px 12px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat,.panel{border:1px solid var(--line);background:rgba(21,23,29,.9);border-radius:20px;box-shadow:0 20px 60px #0005}.stat{padding:18px}.stat span{color:var(--muted);font-size:12px}.stat strong{display:block;font-size:28px;margin-top:8px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.btn{border:0;border-radius:13px;padding:12px 16px;font-weight:800;cursor:pointer}.primary{background:#fff;color:#090a0d}.secondary{background:var(--card2);color:#fff;border:1px solid var(--line)}.danger{background:#331820;color:#ff9baa;border:1px solid #5a2934}
.panel{overflow:hidden}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:1220px}th,td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--line)}th{font-size:11px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;background:#111319;position:sticky;top:0}td{font-size:14px}.status{display:inline-flex;padding:6px 9px;border-radius:999px;font-size:11px;font-weight:800}.done{background:#143522;color:#7ff0a6}.found{background:#162d46;color:#8cc9ff}.unfound{background:#302715;color:#ffd37e}.off{background:#272a31;color:#aeb2bc}.actions{display:flex;gap:7px;flex-wrap:wrap}.icon{padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:#20232b;color:#fff;cursor:pointer}
.empty{padding:50px;text-align:center;color:var(--muted)}
dialog{width:min(620px,calc(100% - 24px));border:1px solid var(--line);border-radius:22px;background:#12141a;color:#fff;padding:0;box-shadow:0 30px 100px #000c}dialog::backdrop{background:#000a;backdrop-filter:blur(8px)}.modal-head,.modal-foot{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}.modal-head{border-bottom:1px solid var(--line)}.modal-foot{border-top:1px solid var(--line);justify-content:flex-end}.form{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:7px}.field.full{grid-column:1/-1}.field label{font-size:12px;color:var(--muted);font-weight:700}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:12px;background:#0d0f14;color:#fff;padding:12px}.field textarea{min-height:110px;resize:vertical}.toast{position:fixed;right:18px;bottom:18px;padding:13px 16px;background:#fff;color:#000;border-radius:12px;font-weight:800;transform:translateY(100px);opacity:0;transition:.25s}.toast.show{transform:none;opacity:1}.hidden{display:none!important}
@media(max-width:760px){.stats{grid-template-columns:1fr 1fr}.top{align-items:flex-start}.form{grid-template-columns:1fr}.field.full{grid-column:auto}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top"><div class="brand"><b>VEZITIVUS QUEST</b><small>NFC uzdevumu administrācija</small></div><div id="connection" class="pill">SAVIENOJAS…</div></div>
  <section class="stats">
    <div class="stat"><span>KOPĀ</span><strong id="sTotal">0</strong></div>
    <div class="stat"><span>ATRASTAS</span><strong id="sFound">0</strong></div>
    <div class="stat"><span>IZPILDĪTAS</span><strong id="sDone">0</strong></div>
    <div class="stat"><span>NEATRASTAS</span><strong id="sUnfound">0</strong></div>
  </section>
  <div class="toolbar">
    <button class="btn primary" onclick="openEditor()">+ JAUNS UZDEVUMS</button>
    <button class="btn secondary" onclick="loadQuests()">ATJAUNOT</button>
    <input id="search" oninput="render()" placeholder="Meklēt pēc ID vai nosaukuma…" style="flex:1;min-width:220px;border:1px solid var(--line);border-radius:13px;background:#111319;color:#fff;padding:12px">
  </div>
  <section class="panel"><div class="table-wrap"><table>
    <thead><tr><th>ID</th><th>Uzdevums</th><th>Punkti</th><th>Statuss</th><th>Pirmā atvēršana</th><th>Atvērts reizes</th><th>Izpildīja</th><th>Izpildes laiks</th><th>NFC saite</th><th>Darbības</th></tr></thead>
    <tbody id="rows"></tbody>
  </table><div id="empty" class="empty hidden">Nav atrasts neviens uzdevums.</div></div></section>
</main>
<dialog id="editor">
  <div class="modal-head"><strong id="editorTitle">Jauns uzdevums</strong><button class="icon" onclick="editor.close()">✕</button></div>
  <div class="form">
    <div class="field"><label>UZDEVUMA ID</label><input id="fId" readonly></div>
    <div class="field"><label>PUNKTI</label><input id="fPoints" type="number" min="0" value="10"></div>
    <div class="field full"><label>NOSAUKUMS</label><input id="fTitle" placeholder="Atrodi slepeno vietu"></div>
    <div class="field full"><label>APRAKSTS</label><textarea id="fDescription" placeholder="Kas dalībniekam jāizdara?"></textarea></div>
    <div class="field"><label>KARTĪTE IESLĒGTA</label><select id="fActive"><option value="TRUE">Jā</option><option value="FALSE">Nē</option></select></div>
    <div class="field"><label>REŽĪMS</label><select id="fMode"><option value="ONCE">Vienreizējs</option><option value="REPEAT">Atkārtojams</option></select></div>
  </div>
  <div class="modal-foot"><button class="btn secondary" onclick="editor.close()">ATCELT</button><button class="btn primary" onclick="saveQuest()">SAGLABĀT</button></div>
</dialog>
<div id="toast" class="toast"></div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbw31QTGPPdNq17AwN8ZWF1XIMJsaSOXdbYqnDdI1RBZxI9LZi4bXOYoxU1d8Zv4c8Vs/exec';
const CARD_PAGE='https://vezitivus.github.io/APP/quest.html?id=';
const adminKey='6969';
let quests=[],editingOriginalId=null;
const $=id=>document.getElementById(id);
async function api(action,payload={}){const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,adminKey,...payload})});const data=await r.json();if(!data.ok)throw new Error(data.error||'Nezināma kļūda');return data}
async function loadQuests(){try{$('connection').textContent='IELĀDĒ…';const d=await api('listQuests');quests=d.quests||[];$('connection').textContent='ONLINE';render()}catch(e){$('connection').textContent='KĻŪDA';toast(e.message)}}
function questStatus(x){if(!x.active)return{cls:'off',text:'IZSLĒGTA'};if(x.completed)return{cls:'done',text:'IZPILDĪTA'};if(x.opened)return{cls:'found',text:'ATRASTA'};return{cls:'unfound',text:'NEATRASTA'}}
function render(){const q=$('search').value.toLowerCase();const list=quests.filter(x=>(x.id+' '+x.title).toLowerCase().includes(q));$('rows').innerHTML=list.map(x=>{const st=questStatus(x);return `<tr><td><b>${esc(x.id)}</b></td><td><b>${esc(x.title)}</b><br><small style="color:var(--muted)">${esc(shorten(x.description,70))}</small></td><td>${Number(x.points)||0}</td><td><span class="status ${st.cls}">${st.text}</span></td><td>${esc(x.firstOpenedAt||'—')}</td><td>${Number(x.openCount)||0}</td><td>${esc(x.completedBy||'—')}</td><td>${esc(x.completedAt||'—')}</td><td><button class="icon" onclick="copyLink('${escAttr(x.id)}')">KOPĒT</button></td><td><div class="actions"><button class="icon" onclick="openEditor('${escAttr(x.id)}')">REDIĢĒT</button><button class="icon" onclick="resetQuest('${escAttr(x.id)}')">RESET IZPILDI</button><button class="icon" onclick="resetQuestFully('${escAttr(x.id)}')">RESET VISU</button><button class="icon danger" onclick="deleteQuest('${escAttr(x.id)}')">DZĒST</button></div></td></tr>`}).join('');$('empty').classList.toggle('hidden',list.length>0);$('sTotal').textContent=quests.length;$('sFound').textContent=quests.filter(x=>x.opened).length;$('sDone').textContent=quests.filter(x=>x.completed).length;$('sUnfound').textContent=quests.filter(x=>!x.opened).length}
function openEditor(id=''){editingOriginalId=id||null;const x=quests.find(q=>q.id===id);$('editorTitle').textContent=x?'Rediģēt uzdevumu':'Jauns uzdevums';$('fId').value=x?.id||randomQuestId();$('fTitle').value=x?.title||'';$('fDescription').value=x?.description||'';$('fPoints').value=x?.points??10;$('fActive').value=String(x?.active??true).toUpperCase();$('fMode').value=x?.mode||'ONCE';editor.showModal()}
function randomQuestId(){const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let value='Q';do{value='Q';for(let i=0;i<7;i++)value+=chars[Math.floor(Math.random()*chars.length)]}while(quests.some(q=>q.id===value));return value}
async function saveQuest(){const quest={id:$('fId').value.trim().toUpperCase(),title:$('fTitle').value.trim(),description:$('fDescription').value.trim(),points:Number($('fPoints').value)||0,active:$('fActive').value==='TRUE',mode:$('fMode').value};if(!quest.id||!quest.title||!quest.description)return toast('Aizpildi nosaukumu un aprakstu');try{await api('saveQuest',{quest,originalId:editingOriginalId});editor.close();toast('Saglabāts');loadQuests()}catch(e){toast(e.message)}}
async function resetQuest(id){if(!confirm(`Atiestatīt ${id} izpildes statusu? Kartīte paliks atzīmēta kā atrasta.`))return;try{await api('resetQuest',{id});toast('Izpildes statuss atiestatīts');loadQuests()}catch(e){toast(e.message)}}
async function resetQuestFully(id){if(!confirm(`Pilnībā atiestatīt ${id}? Kartīte atkal būs NEATRASTA.`))return;try{await api('resetQuestFully',{id});toast('Kartīte pilnībā atiestatīta');loadQuests()}catch(e){toast(e.message)}}
async function deleteQuest(id){if(!confirm(`Neatgriezeniski dzēst ${id}?`))return;try{await api('deleteQuest',{id});toast('Uzdevums dzēsts');loadQuests()}catch(e){toast(e.message)}}
function copyLink(id){navigator.clipboard.writeText(CARD_PAGE+encodeURIComponent(id));toast('NFC saite nokopēta')}
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2600)}
function shorten(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function escAttr(s){return String(s??'').replace(/['\\]/g,'')}
loadQuests();
</script>
</body></html>
