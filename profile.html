<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>VEZITIVUS WeekEnd</title>

  <style>
    :root {
      --bg: #f7f7f9;
      --surface: rgba(255,255,255,.78);
      --surface-strong: rgba(255,255,255,.94);
      --line: rgba(18,18,22,.09);
      --line-strong: rgba(18,18,22,.14);
      --text: #161617;
      --muted: #6e6e73;
      --accent: #111113;
      --shadow: 0 18px 50px rgba(20,20,30,.08);
      --shadow-soft: 0 8px 24px rgba(20,20,30,.06);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 17px;
      --ease: cubic-bezier(.2,.8,.2,1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 5%, rgba(255,255,255,.98) 0, rgba(255,255,255,0) 36%),
        radial-gradient(circle at 88% 15%, rgba(225,229,240,.55) 0, rgba(225,229,240,0) 34%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 56%, #f0f1f4 100%);
      padding:
        calc(14px + var(--safe-top))
        calc(14px + var(--safe-right))
        calc(24px + var(--safe-bottom))
        calc(14px + var(--safe-left));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(115deg, rgba(255,255,255,.7), rgba(255,255,255,0) 36%);
      z-index: -1;
    }

    .profile-page {
      width: min(760px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      padding: 4px 0 2px;
    }

    .main-title {
      margin: 0;
      font-size: clamp(21px, 5vw, 30px);
      font-weight: 750;
      letter-spacing: -.04em;
      line-height: 1;
    }

    .glass-card {
      background: linear-gradient(145deg, rgba(255,255,255,.93), rgba(255,255,255,.67));
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px) saturate(160%);
      -webkit-backdrop-filter: blur(26px) saturate(160%);
      overflow: hidden;
    }

    .profile-section {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 16px;
      padding: 18px;
    }

    .profile-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .image-container {
      position: relative;
      width: 176px;
      height: 176px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.88);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.95), 0 12px 34px rgba(18,18,22,.10);
    }

    #profile-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .image-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      justify-items: center;
      gap: 10px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,.68);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 2;
    }

    .ph-icon {
      width: 46px;
      height: 46px;
      position: relative;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      background: rgba(255,255,255,.8);
    }

    .ph-icon::before {
      content: "";
      position: absolute;
      width: 13px;
      height: 13px;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #b5b5bb;
    }

    .ph-icon::after {
      content: "";
      position: absolute;
      width: 25px;
      height: 13px;
      bottom: 7px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 14px 14px 9px 9px;
      background: #b5b5bb;
    }

    .ph-text {
      font-size: 12px;
      font-weight: 600;
    }

    .profile-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .info-group {
      padding: 12px 4px;
      border-bottom: 1px solid var(--line);
    }

    .info-group:last-child { border-bottom: 0; }

    .label {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .value {
      margin: 4px 0 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: -.02em;
      overflow-wrap: anywhere;
    }

    .large-value {
      margin: 3px 0 0;
      font-size: 34px;
      line-height: 1;
      font-weight: 780;
      letter-spacing: -.05em;
    }

    .mono {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 14px;
      color: #4f4f54;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .primary-button,
    .action-button,
    .checkin-button {
      appearance: none;
      border: 1px solid var(--line-strong);
      cursor: pointer;
      transition: transform .16s var(--ease), box-shadow .16s var(--ease), background .16s var(--ease);
      user-select: none;
    }

    .primary-button {
      width: min(176px, 100%);
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--text);
      font-size: 13px;
      font-weight: 650;
      background: rgba(255,255,255,.76);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.95), var(--shadow-soft);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .navigation-card {
      padding: 10px;
    }

    .buttons-stack {
      display: grid;
      gap: 8px;
    }

    .action-button,
    .checkin-button {
      position: relative;
      width: 100%;
      min-height: 54px;
      padding: 14px 48px 14px 17px;
      border-radius: var(--radius-md);
      color: var(--text);
      text-align: left;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -.01em;
      background: rgba(255,255,255,.72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.98);
    }

    .action-button::after,
    .checkin-button::after {
      content: "›";
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-52%);
      color: #9a9aa0;
      font-size: 27px;
      font-weight: 350;
      line-height: 1;
    }

    .action-button + .action-button,
    .checkin-button + .action-button {
      margin-top: 0;
    }

    .scoreboard-button {
      color: #fff;
      border-color: rgba(0,0,0,.82);
      background: linear-gradient(145deg, #27272a, #070708);
      box-shadow: 0 12px 30px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.16);
    }

    .scoreboard-button::after { color: rgba(255,255,255,.64); }

    .checkin-button {
      background: rgba(245,245,247,.88);
    }

    .button-divider {
      height: 1px;
      margin: 2px 7px;
      background: var(--line);
    }

    .primary-button:hover,
    .action-button:hover,
    .checkin-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(18,18,22,.09), inset 0 1px 0 rgba(255,255,255,.96);
    }

    .scoreboard-button:hover {
      box-shadow: 0 14px 32px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.16);
    }

    .primary-button:active,
    .action-button:active,
    .checkin-button:active {
      transform: scale(.985);
    }

    button:focus-visible {
      outline: 3px solid rgba(0,122,255,.28);
      outline-offset: 2px;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: rgba(247,247,249,.72);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
    }

    .loading-card {
      min-width: 150px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,.86);
      box-shadow: var(--shadow);
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid rgba(18,18,22,.10);
      border-top-color: #262629;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .loading-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      max-width: min(90vw, 480px);
      padding: 11px 15px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transform: translateX(-50%) translateY(14px);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      background: rgba(20,20,22,.88);
      box-shadow: 0 16px 40px rgba(0,0,0,.20);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: opacity .18s var(--ease), transform .18s var(--ease);
      z-index: 9998;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 620px) {
      body {
        padding-left: calc(10px + var(--safe-left));
        padding-right: calc(10px + var(--safe-right));
      }

      .profile-page { gap: 10px; }

      .profile-section {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 16px;
      }

      .image-container {
        width: 148px;
        height: 148px;
      }

      .profile-left { gap: 10px; }
      .profile-right { padding-top: 4px; }
      .info-group { padding: 10px 2px; }
      .value { font-size: 17px; }
      .large-value { font-size: 31px; }
      .glass-card { border-radius: 25px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>

<body>
  <div id="loading-overlay" aria-live="polite" aria-busy="true">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <div class="loading-text">Ielādē…</div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <main class="profile-page">
    <header class="topbar">
      <h1 class="main-title">VEZITIVUS WeekEnd</h1>
    </header>

    <section class="profile-section glass-card">
      <div class="profile-left">
        <div class="image-container">
          <input type="file" id="image-input" accept="image/*" style="display:none;">
          <img id="profile-image" src="" alt="Profilattēls" style="display:none;">
          <div class="image-placeholder" id="image-placeholder" aria-hidden="true">
            <div class="ph-icon"></div>
            <div class="ph-text">Pievieno attēlu</div>
          </div>
        </div>

        <button id="change-button" class="primary-button">Nomainīt attēlu</button>
      </div>

      <div class="profile-right">
        <div class="info-group">
          <p class="label">Vārds</p>
          <p class="value" id="username">Ielādē...</p>
        </div>
        <div class="info-group">
          <p class="label">ID</p>
          <p class="value mono" id="nfc-id">Ielādē...</p>
        </div>
        <div class="info-group">
          <p class="label">Kopvērtējuma vieta</p>
          <p class="large-value" id="place">Ielādē...</p>
        </div>
        <div class="info-group">
          <p class="label">Tava komanda</p>
          <p class="value" id="team-name">Ielādē...</p>
        </div>
      </div>
    </section>

    <section class="navigation-card glass-card" aria-label="Profila navigācija">
      <div class="buttons-stack">
        <button class="action-button scoreboard-button" onclick="window.location.href='score.html'">Scoreboard</button>
        <button id="checkin-button" class="checkin-button">Check-in aktivitātēm</button>

        <div class="button-divider" aria-hidden="true"></div>

        <button class="action-button" onclick="redirectToActivity()">Vezitivus lenta</button>
        <button class="action-button" onclick="redirectToSimpathy()">Simpātijas balva</button>
        <button class="action-button" onclick="redirectToSpin()">Minigame</button>
        <button class="action-button" onclick="redirectToOption()">Option</button>
        <button class="action-button" onclick="redirectToSuggest()">Ieteikumi</button>
      </div>
    </section>
  </main>

  <script>
    function showToast(message) {
      const el = document.getElementById("toast");
      if (!el) return;
      el.textContent = message;
      el.classList.add("show");
      window.clearTimeout(window.__toastTimer);
      window.__toastTimer = window.setTimeout(() => el.classList.remove("show"), 2600);
    }

    window.addEventListener("load", function() {
      const lo = document.getElementById("loading-overlay");
      if (lo) {
        lo.style.display = "none";
        lo.setAttribute("aria-busy", "false");
      }
    });

    function syncImagePlaceholder() {
      const img = document.getElementById("profile-image");
      const ph = document.getElementById("image-placeholder");
      if (!img || !ph) return;
      const visible = img.style.display !== "none" && img.getAttribute("src");
      ph.style.display = visible ? "none" : "grid";
    }

    document.addEventListener("DOMContentLoaded", () => {
      syncImagePlaceholder();
      const img = document.getElementById("profile-image");
      if (img) {
        img.addEventListener("load", syncImagePlaceholder);
        img.addEventListener("error", syncImagePlaceholder);
      }
    });

    function redirectToActivity() {
      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");
      if (uid) {
        window.location.href = `activity.html?uid=${uid}`;
      } else {
        showToast("UID nav atrasts!");
      }
    }

    function redirectToSimpathy() {
      const uid = document.getElementById("nfc-id").innerText.trim();
      window.location.href = `https://vezitivus.github.io/APP/simpathy.html?uid=${uid}`;
    }

    function redirectToSpin() {
      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");
      if (uid) {
        window.location.href = `book.html?uid=${uid}`;
      } else {
        showToast("UID nav atrasts!");
      }
    }

    function redirectToOption() {
      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");
      if (uid) {
        window.location.href = `ch.html?uid=${uid}`;
      } else {
        showToast("UID nav atrasts!");
      }
    }

    function redirectToSuggest() {
      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");
      if (uid) {
        window.location.href = `suggest.html?uid=${uid}`;
      } else {
        showToast("UID nav atrasts!");
      }
    }
  </script>

  <script src="profile.js"></script>
</body>
</html>
