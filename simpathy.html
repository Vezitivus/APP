<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090c">
  <title>Simpatijas balva</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090c;
      --surface: rgba(22, 24, 30, 0.82);
      --surface-strong: rgba(29, 31, 39, 0.96);
      --line: rgba(255, 255, 255, 0.10);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #f7f7f8;
      --muted: #9ca0aa;
      --accent: #f4f4f5;
      --accent-text: #090a0d;
      --success: #35d07f;
      --danger: #ff6b6b;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --header-height: 78px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% -10%, rgba(255, 255, 255, 0.08), transparent 35%),
        radial-gradient(circle at 92% 12%, rgba(119, 123, 155, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      min-height: var(--header-height);
      padding: max(14px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) 14px max(18px, env(safe-area-inset-left));
      border-bottom: 1px solid var(--line);
      background: rgba(8, 9, 12, 0.78);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
    }

    .header-inner {
      width: min(1120px, 100%);
      min-height: 48px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      font-size: clamp(20px, 4vw, 28px);
      line-height: 1.05;
      letter-spacing: -0.035em;
    }

    .vote-status {
      flex: 0 0 auto;
      min-width: 82px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .vote-status-icon {
      font-size: 17px;
      line-height: 1;
    }

    .vote-status-copy {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .vote-status-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .vote-remaining {
      font-size: 17px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .content {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 28px max(16px, env(safe-area-inset-right)) max(44px, calc(env(safe-area-inset-bottom) + 24px)) max(16px, env(safe-area-inset-left));
    }

    .intro {
      margin-bottom: 24px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025));
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
    }

    .intro-title {
      margin: 0 0 7px;
      font-size: clamp(18px, 4vw, 23px);
      letter-spacing: -0.025em;
    }

    .intro-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .gallery-head {
      margin: 0 2px 14px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    .gallery-title {
      margin: 0;
      font-size: 15px;
      letter-spacing: -0.01em;
    }

    .gallery-hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .image-container {
      position: relative;
      width: 100%;
      height: auto !important;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
      cursor: pointer;
      isolation: isolate;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .image-container::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.02) 48%, rgba(0, 0, 0, 0.48) 100%);
    }

    .image-container:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.30);
    }

    .image-container:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.85);
      outline-offset: 3px;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 320ms ease, opacity 180ms ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .image-container:hover img {
      transform: scale(1.025);
    }

    .image-container.image-error img {
      opacity: 0;
    }

    .image-container.image-error::before {
      content: "Attēlu neizdevās ielādēt";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .vote-count {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3;
      min-width: 40px;
      min-height: 30px;
      padding: 6px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(8, 9, 12, 0.70);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .vote-count::before {
      content: "✋";
      font-size: 12px;
    }

    .open-label {
      position: absolute;
      left: 12px;
      bottom: 11px;
      z-index: 3;
      color: rgba(255, 255, 255, 0.88);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .vote-button,
    .close-button {
      border: 0;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
    }

    .vote-button {
      position: absolute;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 6;
      width: min(360px, calc(100% - 36px));
      min-height: 52px;
      padding: 13px 18px;
      transform: translateX(-50%) translateY(14px);
      border-radius: 999px;
      background: var(--accent);
      color: var(--accent-text);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.40);
      font-size: 15px;
      font-weight: 850;
      opacity: 0;
      pointer-events: none;
    }

    .vote-button:active:not(:disabled) {
      transform: translateX(-50%) scale(0.98);
    }

    .vote-button:disabled {
      cursor: not-allowed;
      opacity: 0.55 !important;
    }

    .close-button {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 7;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      background: rgba(8, 9, 12, 0.74);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 20px;
      opacity: 0;
      pointer-events: none;
    }

    .selection-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1090;
      border: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .selection-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .image-container.selected {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 1100;
      width: min(92vw, 760px);
      height: min(78vh, 760px) !important;
      aspect-ratio: auto;
      transform: translate(-50%, -50%);
      border-color: var(--line-strong);
      border-radius: var(--radius-xl);
      background: #050608;
      box-shadow: var(--shadow);
      cursor: default;
    }

    .image-container.selected:hover {
      transform: translate(-50%, -50%);
    }

    .image-container.selected::after {
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.16), transparent 24%, transparent 62%, rgba(0, 0, 0, 0.68));
    }

    .image-container.selected img,
    .image-container.selected:hover img {
      object-fit: contain;
      transform: none;
    }

    .image-container.selected .vote-button,
    .image-container.selected .close-button {
      opacity: 1;
      pointer-events: auto;
    }

    .image-container.selected .vote-button {
      transform: translateX(-50%) translateY(0);
    }

    .image-container.selected .open-label {
      display: none;
    }

    .state-panel {
      min-height: 220px;
      display: grid;
      place-items: center;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.035);
      text-align: center;
    }

    .state-content {
      max-width: 360px;
    }

    #loader {
      width: 38px;
      height: 38px;
      margin: 0 auto 18px;
      border: 3px solid rgba(255, 255, 255, 0.14);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 800ms linear infinite;
    }

    .state-title {
      margin: 0 0 7px;
      font-size: 16px;
    }

    .state-text {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .retry-button {
      margin-top: 16px;
      min-height: 42px;
      padding: 10px 17px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      font-weight: 750;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(22px, calc(env(safe-area-inset-bottom) + 14px));
      z-index: 2000;
      width: min(430px, calc(100vw - 32px));
      padding: 13px 16px;
      transform: translate(-50%, 18px);
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: rgba(27, 29, 36, 0.96);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.46);
      color: var(--text);
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .toast.success {
      border-color: rgba(53, 208, 127, 0.42);
    }

    .toast.error {
      border-color: rgba(255, 107, 107, 0.46);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (min-width: 600px) {
      .content {
        padding-top: 36px;
      }

      .image-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
    }

    @media (min-width: 920px) {
      .image-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }

      .intro {
        padding: 24px 26px;
      }
    }

    @media (max-width: 480px) {
      .header-inner {
        gap: 10px;
      }

      .vote-status {
        min-width: 72px;
        padding: 7px 10px;
      }

      .vote-status-label {
        display: none;
      }

      .intro {
        padding: 17px;
      }

      .image-container.selected {
        width: calc(100vw - 20px);
        height: min(80vh, 720px) !important;
        border-radius: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <p class="eyebrow">VEZITIVUS</p>
        <h1 class="title">Simpatijas balva</h1>
      </div>

      <div class="vote-status" aria-label="Atlikušās balsis">
        <span class="vote-status-icon" aria-hidden="true">✋</span>
        <span class="vote-status-copy">
          <span class="vote-status-label">Atlikušas</span>
          <span id="profileVotes" class="vote-remaining">–</span>
        </span>
      </div>
    </div>
  </header>

  <main class="content">
    <section class="intro" aria-labelledby="introTitle">
      <h2 class="intro-title" id="introTitle">Izvēlies savu favorītu</h2>
      <p class="intro-text">Atver attēlu, apskati to pilnā izmērā un nobalso. Pie katra attēla redzams pašreizējais balsu skaits.</p>
    </section>

    <div class="gallery-head">
      <h2 class="gallery-title">Dalībnieki</h2>
      <p class="gallery-hint">Pieskaries attēlam</p>
    </div>

    <section id="loadingState" class="state-panel" aria-live="polite">
      <div class="state-content">
        <div id="loader" aria-hidden="true"></div>
        <p class="state-title">Ielādējam attēlus</p>
        <p class="state-text">Tas var aizņemt dažas sekundes.</p>
      </div>
    </section>

    <div class="image-grid" id="imageGrid" aria-live="polite"></div>
  </main>

  <button id="selectionBackdrop" class="selection-backdrop" type="button" aria-label="Aizvērt attēlu"></button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    // Google Apps Script Web App deploy URL — saglabāts nemainīts.
    const scriptUrl = "https://script.google.com/macros/s/AKfycby8p72BLoVvL0VwBePZ278XmJ1CW23l58ZKJgSuu1qoROM9oytJNb1zPVhJ8JDYqW9EYg/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get("uid") || "defaultUid";

    const grid = document.getElementById("imageGrid");
    const loadingState = document.getElementById("loadingState");
    const profileVotes = document.getElementById("profileVotes");
    const selectionBackdrop = document.getElementById("selectionBackdrop");
    const toast = document.getElementById("toast");

    let remainingVotes = null;
    let selectedContainer = null;
    let toastTimer = null;

    function showToast(message, type = "") {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.className = `toast visible ${type}`.trim();
      toastTimer = setTimeout(() => {
        toast.className = "toast";
      }, 2800);
    }

    function setLoadingState(title, text, showSpinner = true, allowRetry = false) {
      loadingState.hidden = false;
      loadingState.innerHTML = `
        <div class="state-content">
          ${showSpinner ? '<div id="loader" aria-hidden="true"></div>' : ''}
          <p class="state-title">${title}</p>
          <p class="state-text">${text}</p>
          ${allowRetry ? '<button class="retry-button" id="retryButton" type="button">Mēģināt vēlreiz</button>' : ''}
        </div>
      `;

      if (allowRetry) {
        document.getElementById("retryButton").addEventListener("click", fetchImages);
      }
    }

    function syncVoteAvailability() {
      const noVotesLeft = Number.isFinite(remainingVotes) && remainingVotes <= 0;
      document.querySelectorAll(".vote-button").forEach((button) => {
        button.disabled = noVotesLeft || button.dataset.busy === "true";
        if (noVotesLeft) {
          button.textContent = "Balsis izlietotas";
        } else if (button.dataset.busy !== "true") {
          button.textContent = "Balsot par šo attēlu";
        }
      });
    }

    async function fetchProfile() {
      try {
        const response = await fetch(scriptUrl + "?action=getProfile&uid=" + encodeURIComponent(uid));
        if (!response.ok) throw new Error("Profile request failed");

        const result = await response.json();
        if (result.status === "success") {
          const parsedRemaining = Number(result.remaining);
          remainingVotes = Number.isFinite(parsedRemaining) ? parsedRemaining : null;
          profileVotes.textContent = result.remaining;
        } else {
          remainingVotes = 0;
          profileVotes.textContent = "0";
        }
      } catch (error) {
        console.error("Error fetching profile", error);
        remainingVotes = null;
        profileVotes.textContent = "–";
      } finally {
        syncVoteAvailability();
      }
    }

    async function fetchImages() {
      setLoadingState("Ielādējam attēlus", "Tas var aizņemt dažas sekundes.", true, false);
      grid.innerHTML = "";

      try {
        const response = await fetch(scriptUrl + "?action=getImages");
        if (!response.ok) throw new Error("Images request failed");

        const result = await response.json();
        if (result.status === "success") {
          const images = Array.isArray(result.data) ? result.data : [];
          displayImages(images);

          if (images.length === 0) {
            setLoadingState("Pašlaik nav attēlu", "Kad attēli būs pievienoti, tie parādīsies šeit.", false, false);
          } else {
            loadingState.hidden = true;
          }
        } else {
          throw new Error(result.message || "Unable to load images");
        }
      } catch (error) {
        console.error("Error fetching images", error);
        setLoadingState("Attēlus neizdevās ielādēt", "Pārbaudi interneta savienojumu un mēģini vēlreiz.", false, true);
      }
    }

    function closeSelectedImage() {
      if (!selectedContainer) return;

      selectedContainer.classList.remove("selected");
      selectedContainer.setAttribute("aria-expanded", "false");
      selectedContainer = null;
      selectionBackdrop.classList.remove("visible");
      document.body.classList.remove("modal-open");
    }

    function openSelectedImage(container) {
      if (selectedContainer && selectedContainer !== container) {
        selectedContainer.classList.remove("selected");
        selectedContainer.setAttribute("aria-expanded", "false");
      }

      selectedContainer = container;
      container.classList.add("selected");
      container.setAttribute("aria-expanded", "true");
      selectionBackdrop.classList.add("visible");
      document.body.classList.add("modal-open");

      const closeButton = container.querySelector(".close-button");
      window.setTimeout(() => closeButton?.focus({ preventScroll: true }), 80);
    }

    function toggleSelectedImage(container) {
      if (container.classList.contains("selected")) {
        closeSelectedImage();
      } else {
        openSelectedImage(container);
      }
    }

    function displayImages(images) {
      grid.innerHTML = "";

      images.forEach((image, index) => {
        const container = document.createElement("article");
        container.className = "image-container";
        container.dataset.imageUrl = image.imageUrl;
        container.dataset.votes = image.votes;
        container.setAttribute("role", "button");
        container.setAttribute("tabindex", "0");
        container.setAttribute("aria-label", `Atvērt attēlu ${index + 1}`);
        container.setAttribute("aria-expanded", "false");

        const img = document.createElement("img");
        img.src = image.imageUrl;
        img.alt = `Simpatijas balvas dalībnieks ${index + 1}`;
        img.loading = index < 4 ? "eager" : "lazy";
        img.decoding = "async";
        img.addEventListener("error", () => container.classList.add("image-error"));
        container.appendChild(img);

        const voteCount = document.createElement("div");
        voteCount.className = "vote-count";
        voteCount.setAttribute("aria-label", "Balsu skaits");
        voteCount.textContent = (typeof image.votes !== "undefined" && image.votes !== null) ? image.votes : 0;
        container.appendChild(voteCount);

        const openLabel = document.createElement("span");
        openLabel.className = "open-label";
        openLabel.textContent = "Atvērt un balsot";
        container.appendChild(openLabel);

        const closeButton = document.createElement("button");
        closeButton.className = "close-button";
        closeButton.type = "button";
        closeButton.setAttribute("aria-label", "Aizvērt attēlu");
        closeButton.innerHTML = "&times;";
        closeButton.addEventListener("click", (event) => {
          event.stopPropagation();
          closeSelectedImage();
        });
        container.appendChild(closeButton);

        const voteButton = document.createElement("button");
        voteButton.className = "vote-button";
        voteButton.type = "button";
        voteButton.textContent = "Balsot par šo attēlu";
        voteButton.dataset.busy = "false";
        voteButton.addEventListener("click", async (event) => {
          event.stopPropagation();
          if (voteButton.disabled) return;

          voteButton.dataset.busy = "true";
          voteButton.disabled = true;
          voteButton.textContent = "Balso...";

          const success = await voteForImage(container.dataset.imageUrl, container, voteCount, uid);

          voteButton.dataset.busy = "false";
          if (success) {
            showToast("Tava balss ir saglabāta", "success");
            closeSelectedImage();
            await fetchProfile();
          } else {
            syncVoteAvailability();
          }
        });
        container.appendChild(voteButton);

        container.addEventListener("click", () => toggleSelectedImage(container));
        container.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            toggleSelectedImage(container);
          }
        });

        grid.appendChild(container);
      });

      syncVoteAvailability();
    }

    async function voteForImage(imageUrl, container, voteCountElement, voterUid) {
      try {
        const response = await fetch(scriptUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `action=vote&imageUrl=${encodeURIComponent(imageUrl)}&uid=${encodeURIComponent(voterUid)}`
        });

        if (!response.ok) throw new Error("Vote request failed");

        const result = await response.json();
        if (result.status === "success") {
          container.dataset.votes = result.votes;
          voteCountElement.textContent = result.votes;
          return true;
        }

        showToast(result.message || "Balsojumu neizdevās saglabāt", "error");
        return false;
      } catch (error) {
        console.error("Error voting", error);
        showToast("Savienojuma kļūda. Mēģini vēlreiz.", "error");
        return false;
      }
    }

    selectionBackdrop.addEventListener("click", closeSelectedImage);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeSelectedImage();
    });

    document.addEventListener("DOMContentLoaded", () => {
      fetchProfile();
      fetchImages();
    });
  </script>
</body>
</html>
