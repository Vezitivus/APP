<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Game On Online</title>
  <link rel="stylesheet" href="./gameononline.css?v=2">
</head>
<body>
  <iframe id="appFrame" title="Game On turnīru aplikācija" hidden></iframe>

  <section class="lobby" id="lobby">
    <div class="lobby-card">
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <div class="brand-title">Game On Online</div>
          <div class="brand-sub">Izveido jaunu spēli vai pievienojies no citas ierīces.</div>
        </div>
      </div>

      <div class="choice-grid" role="tablist" aria-label="Spēles režīms">
        <button class="choice active" id="createChoice" type="button" data-mode="create">
          <strong>Izveidot spēli</strong>
          <span>Ievadi jaunu PIN. Google Sheets automātiski izveidos atsevišķu lapu šai spēlei.</span>
        </button>
        <button class="choice" id="joinChoice" type="button" data-mode="join">
          <strong>Pievienoties spēlei</strong>
          <span>Ievadi organizatora PIN, lai atvērtu to pašu spēli un rezultātus.</span>
        </button>
      </div>

      <div class="form-box">
        <label class="field-label" for="pinInput" id="pinLabel">Jaunās spēles PIN</label>
        <div class="pin-wrap">
          <input class="pin-input" id="pinInput" type="password" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="••••" aria-describedby="formHelp">
          <button class="primary" id="enterBtn" type="button">Izveidot</button>
        </div>
        <div class="form-help" id="formHelp">Izmanto 4–8 ciparus. PIN būs vajadzīgs visām ierīcēm, kas pievienosies spēlei.</div>
        <div class="lobby-status" id="lobbyStatus" aria-live="polite"></div>
      </div>
    </div>
  </section>

  <div class="session-bar" id="sessionBar" hidden>
    <span>Spēles PIN: <b id="sessionPin">—</b></span>
    <button id="leaveBtn" type="button">Mainīt spēli</button>
  </div>

  <div class="sync-pill" id="syncPill" data-state="busy" aria-live="polite" hidden>
    <span class="sync-dot" aria-hidden="true"></span>
    <span id="syncText">Savienojas</span>
    <span class="sync-detail" id="syncDetail"></span>
  </div>

  <script src="./gameononline.js?v=2"></script>
</body>
</html>
